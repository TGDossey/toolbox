<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolbox — Site Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --card: #fff8ed;
      --ink: #162b36;
      --muted: #5f6f76;
      --accent: #c24428;
      --accent-soft: #ffd7cb;
      --line: #e3d6c2;
      --panel-w: 440px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #f7efe3 0%, #efe5d7 100%);
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { display: none; }

    /* ── App shell ── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px;
      background: rgba(255, 248, 237, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(6px);
      flex-shrink: 0;
      gap: 12px;
    }
    .brand .kicker {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 700;
    }
    .brand h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.45rem;
      line-height: 1.1;
    }
    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Buttons ── */
    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 16px;
      background: #fffdf8;
      color: var(--ink);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: transform 130ms ease, border-color 130ms ease;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); border-color: #c9b79f; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #a3361f; border-color: #a3361f; }
    .btn-sm { padding: 5px 13px; font-size: 0.8rem; }
    .btn-ghost {
      border: none; background: none; color: var(--muted); font-size: 0.8rem;
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
      font-family: 'Space Grotesk', sans-serif; line-height: 1;
    }
    .btn-ghost:hover { color: var(--accent); }

    /* ── Body ── */
    .app-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* ── Builder panel ── */
    .builder-panel {
      width: var(--panel-w);
      flex-shrink: 0;
      min-height: 0;
      background: rgba(255, 248, 237, 0.97);
      border-right: 1px solid var(--line);
      overflow-y: scroll;
      scrollbar-width: thin;
      scrollbar-color: #d5c2a8 transparent;
      padding: 16px;
    }
    .builder-panel > * + * { margin-top: 14px; }
    .builder-panel::-webkit-scrollbar { width: 6px; }
    .builder-panel::-webkit-scrollbar-track { background: transparent; }
    .builder-panel::-webkit-scrollbar-thumb { background: #d5c2a8; border-radius: 999px; }
    .builder-panel::-webkit-scrollbar-thumb:hover { background: #c9b79f; }

      /* ── Theme swatches ── */
      .theme-swatches { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .theme-swatch {
        width: 30px; height: 30px; border-radius: 50%;
        border: 3px solid transparent;
        cursor: pointer; font-size: 0.7rem; color: #fff; font-weight: 900;
        display: flex; align-items: center; justify-content: center;
        transition: transform 130ms ease, border-color 130ms ease;
        outline: none;
      }
      .theme-swatch:hover { transform: scale(1.15); }
      .theme-swatch.active { border-color: var(--ink); box-shadow: 0 0 0 2px #fff inset; }
      .theme-name { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* ── Form sections ── */
    .form-section {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: var(--card);
    }
    .section-head {
      padding: 9px 14px;
      background: rgba(227, 214, 194, 0.35);
      border-bottom: 1px solid var(--line);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: var(--muted);
    }
    .section-head em { font-style: normal; color: var(--accent); text-transform: none; letter-spacing: 0; }
    .section-body { padding: 13px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Template cards ── */
    .template-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .template-card {
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 13px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 130ms ease, background 130ms ease;
      background: #fffdf8;
    }
    .template-card.active { border-color: var(--accent); background: var(--accent-soft); }
    .template-card .t-icon { font-size: 1.5rem; display: block; margin-bottom: 5px; }
    .template-card .t-name { font-size: 0.84rem; font-weight: 700; }
    .template-card .t-desc { font-size: 0.73rem; color: var(--muted); margin-top: 2px; line-height: 1.3; }

    /* ── Inputs ── */
    label {
      font-size: 0.8rem; font-weight: 700; color: var(--muted);
      display: block; margin-bottom: 3px;
    }
    input[type="text"], input[type="url"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.86rem;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background: #fffdf8;
      outline: none;
      transition: border-color 130ms ease;
    }
    input[type="text"]:focus, input[type="url"]:focus { border-color: var(--accent); }

    /* ── Pills ── */
    .pill-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.79rem;
      font-weight: 700;
      cursor: pointer;
      background: #fffdf8;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: border-color 130ms ease, background 130ms ease;
      user-select: none;
    }
    .pill.active { border-color: var(--accent); background: var(--accent-soft); }
    .pill .del { color: var(--muted); font-size: 0.72rem; cursor: pointer; }
    .pill .del:hover { color: var(--accent); }

    /* ── Metric rows ── */
    .col-heads {
      display: grid;
      grid-template-columns: 1fr 1fr 22px;
      gap: 5px;
      padding-bottom: 2px;
    }
    .col-heads span { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-row { display: grid; grid-template-columns: 1fr 1fr 22px; gap: 5px; align-items: center; }
    .metric-row input { font-size: 0.81rem; padding: 5px 8px; }

    /* ── Tool entries ── */
    .tool-entry {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fffdf8;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .tool-row-top { display: grid; grid-template-columns: 1fr 1fr 22px; gap: 5px; align-items: center; }
    .tool-row-bot { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .tool-entry input { font-size: 0.81rem; padding: 5px 8px; }

    /* ── Preview panel ── */
    .preview-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 18px;
      background: rgba(255, 248, 237, 0.85);
      border-bottom: 1px solid var(--line);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    #previewStatus { font-weight: 400; letter-spacing: 0; text-transform: none; color: #a09080; }
    #previewFrame { flex: 1; border: none; width: 100%; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .app-body { flex-direction: column; }
      .builder-panel { width: 100%; height: 55vh; border-right: none; border-bottom: 1px solid var(--line); }
      .preview-panel { height: 45vh; }
      :root { --panel-w: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <p class="kicker">Site Builder</p>
        <h1>Toolbox</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-sm" id="refreshBtn">↺ Refresh</button>
        <button class="btn btn-sm" id="importBtn">⬆ Import ToolBox</button>
        <button class="btn btn-primary btn-sm" id="downloadBtn">⬇ Download ToolBox</button>
      </div>
    </header>
    <input type="file" id="importInput" accept=".html,.htm,.json" hidden>

    <div class="app-body">
      <aside class="builder-panel" id="builderPanel"></aside>
      <div class="preview-panel">
        <div class="preview-bar">
          <span>Live Preview</span>
          <span id="previewStatus"></span>
        </div>
        <iframe id="previewFrame" title="Live Preview" sandbox="allow-scripts"></iframe>
      </div>
    </div>
  </div>

  <script>
    // ─── THEMES ──────────────────────────────────────────────────────────────
    const THEMES = {
      parchment: {
        name:'Parchment', swatch:'#c24428', card:'#fff8ed', ink:'#162b36', muted:'#5f6f76', accent:'#c24428', accentSoft:'#ffd7cb', line:'#e3d6c2',
        surface:'rgba(255,248,237,.8)', surfaceBorder:'rgba(227,214,194,.7)', heroA:'rgba(255,215,203,.7)', heroB:'rgba(255,248,237,.8)', chipBg:'#fffdf8', hoverLine:'#c9b79f', cardSoft:'rgba(255,248,237,.85)',
        bg:'linear-gradient(160deg,#f7efe3 0%,#efe5d7 100%)', r1:'rgba(194,68,40,.2)', r2:'rgba(47,143,87,.16)', shadow:'rgba(28,35,40,.12)'
      },
      slate: {
        name:'Slate', swatch:'#3b82f6', card:'#f0f4f8', ink:'#1e293b', muted:'#64748b', accent:'#3b82f6', accentSoft:'#dbeafe', line:'#cbd5e1',
        surface:'rgba(240,244,248,.82)', surfaceBorder:'rgba(203,213,225,.8)', heroA:'rgba(219,234,254,.85)', heroB:'rgba(240,244,248,.82)', chipBg:'#f8fafc', hoverLine:'#93c5fd', cardSoft:'rgba(240,244,248,.88)',
        bg:'linear-gradient(160deg,#e8edf2 0%,#d8e0e8 100%)', r1:'rgba(59,130,246,.15)', r2:'rgba(100,116,139,.2)', shadow:'rgba(30,41,59,.12)'
      },
      forest: {
        name:'Forest', swatch:'#16a34a', card:'#f0f7f1', ink:'#14532d', muted:'#4d7c5b', accent:'#16a34a', accentSoft:'#dcfce7', line:'#bbf7d0',
        surface:'rgba(240,247,241,.84)', surfaceBorder:'rgba(187,247,208,.8)', heroA:'rgba(220,252,231,.9)', heroB:'rgba(240,247,241,.84)', chipBg:'#f7fcf8', hoverLine:'#4ade80', cardSoft:'rgba(240,247,241,.9)',
        bg:'linear-gradient(160deg,#e8f0e9 0%,#d8e8d9 100%)', r1:'rgba(34,197,94,.15)', r2:'rgba(21,128,61,.1)', shadow:'rgba(20,83,45,.12)'
      },
      midnight: {
        name:'Midnight', swatch:'#8b5cf6', card:'#2a2a3d', ink:'#e2e2f0', muted:'#9090b0', accent:'#8b5cf6', accentSoft:'#3d2e5e', line:'#3d3d5c',
        surface:'rgba(34,34,52,.86)', surfaceBorder:'rgba(61,61,92,.85)', heroA:'rgba(61,46,94,.8)', heroB:'rgba(42,42,61,.86)', chipBg:'#25253a', hoverLine:'#a78bfa', cardSoft:'rgba(42,42,61,.9)',
        bg:'linear-gradient(160deg,#1e1e2e 0%,#16161f 100%)', r1:'rgba(139,92,246,.15)', r2:'rgba(59,130,246,.1)', shadow:'rgba(0,0,0,.3)'
      },
      rose: {
        name:'Rose', swatch:'#db2777', card:'#fdf4fb', ink:'#500724', muted:'#9d4069', accent:'#db2777', accentSoft:'#fce7f3', line:'#f9a8d4',
        surface:'rgba(253,244,251,.84)', surfaceBorder:'rgba(249,168,212,.82)', heroA:'rgba(252,231,243,.88)', heroB:'rgba(253,244,251,.84)', chipBg:'#fff7fc', hoverLine:'#f472b6', cardSoft:'rgba(253,244,251,.9)',
        bg:'linear-gradient(160deg,#fdf2f8 0%,#fce7f3 100%)', r1:'rgba(236,72,153,.15)', r2:'rgba(219,39,119,.1)', shadow:'rgba(80,7,36,.12)'
      }
    };

    function themeRootCss() {
      const t = THEMES[S.theme] || THEMES.parchment;
      return `:root{--card:${t.card};--ink:${t.ink};--muted:${t.muted};--accent:${t.accent};--accent-soft:${t.accentSoft};--line:${t.line};--surface:${t.surface};--surface-border:${t.surfaceBorder};--hero-a:${t.heroA};--hero-b:${t.heroB};--chip-bg:${t.chipBg};--hover-line:${t.hoverLine};--card-soft:${t.cardSoft};--shadow:0 18px 45px ${t.shadow}}`;
    }
    function themeBgCss() {
      const t = THEMES[S.theme] || THEMES.parchment;XMLDocument
      return `html{background:radial-gradient(circle at 10% 20%,${t.r1},transparent 42%),radial-gradient(circle at 90% 80%,${t.r2},transparent 40%),${t.bg};background-attachment:fixed}`;
    }

    // ─── STATE ───────────────────────────────────────────────────────────────
    let S = {
      template: 'dashboard',
      theme: 'parchment',
      title: '',
      kicker: '',
      activeTab: 0,
      activeCategory: 0,
      tabs: [],
      tools: []
    };

    // ─── UTILS ───────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function clamp(n, min, max) {
      return Math.min(Math.max(n, min), max);
    }

    function toCleanString(v) {
      return String(v == null ? '' : v);
    }

    function normalizeImportedState(raw) {
      const base = raw && typeof raw === 'object' ? raw : {};
      const tabs = Array.isArray(base.tabs) ? base.tabs.map(tab => ({
        label: toCleanString(tab && tab.label),
        categories: Array.isArray(tab && tab.categories)
          ? tab.categories.map(cat => ({
              label: toCleanString(cat && cat.label),
              metrics: Array.isArray(cat && cat.metrics)
                ? cat.metrics.map(metric => ({
                    label: toCleanString(metric && metric.label),
                    value: toCleanString(metric && metric.value)
                  }))
                : []
            }))
          : []
      })) : [];

      const tools = Array.isArray(base.tools) ? base.tools.map(tool => ({
        name: toCleanString(tool && tool.name),
        type: toCleanString(tool && tool.type),
        description: toCleanString(tool && tool.description),
        url: toCleanString(tool && tool.url)
      })) : [];

      const activeTab = tabs.length ? clamp(Number(base.activeTab) || 0, 0, tabs.length - 1) : 0;
      const activeCategoryMax = tabs[activeTab] ? Math.max(0, tabs[activeTab].categories.length - 1) : 0;
      const activeCategory = activeCategoryMax ? clamp(Number(base.activeCategory) || 0, 0, activeCategoryMax) : 0;

      return {
        template: base.template === 'catalog' ? 'catalog' : 'dashboard',
        theme: THEMES[base.theme] ? base.theme : 'parchment',
        title: toCleanString(base.title),
        kicker: toCleanString(base.kicker),
        activeTab,
        activeCategory,
        tabs,
        tools
      };
    }

    function getExportState() {
      return normalizeImportedState(S);
    }

    function buildToolboxStateTag() {
      const json = JSON.stringify(getExportState()).replace(/</g, '\\u003c');
      return `<script id="toolbox-state" type="application/json">${json}<\\/script>`;
    }

    function inferThemeFromDoc(doc) {
      const styleText = [...doc.querySelectorAll('style')]
        .map(s => s.textContent || '')
        .join('\n');

      for (const [key, t] of Object.entries(THEMES)) {
        if (styleText.includes(`--accent:${t.accent}`)) {
          return key;
        }
      }
      return 'parchment';
    }

    function inferStateFromHtmlDoc(doc) {
      const title = toCleanString((doc.querySelector('h1') || {}).textContent || doc.title);
      const kicker = toCleanString((doc.querySelector('.kicker') || {}).textContent);
      const theme = inferThemeFromDoc(doc);

      if (doc.querySelector('.tool-card')) {
        const tools = [...doc.querySelectorAll('.tool-card')].map(card => ({
          name: toCleanString((card.querySelector('.t-name') || {}).textContent || card.dataset.name),
          type: toCleanString((card.querySelector('.badge') || {}).textContent || card.dataset.type),
          description: toCleanString((card.querySelector('.t-desc') || {}).textContent),
          url: toCleanString(card.getAttribute('href'))
        }));

        return {
          template: 'catalog',
          theme,
          title,
          kicker,
          activeTab: 0,
          activeCategory: 0,
          tabs: [],
          tools
        };
      }

      const tabEls = [...doc.querySelectorAll('.tab')];
      const tabs = tabEls.map((tabEl, ti) => {
        const panel = doc.querySelector(`[data-panel="t${ti}"]`) || doc.querySelectorAll('.panel')[ti];
        if (!panel) {
          return { label: toCleanString(tabEl.textContent), categories: [] };
        }

        const categories = [...panel.querySelectorAll('.section-btn')].map((catBtn, ci) => {
          const key = catBtn.dataset.section || `c${ti}_${ci}`;
          const catNode = panel.querySelector(`[data-category="${key}"]`) || panel.querySelectorAll('.category')[ci];
          const metrics = catNode
            ? [...catNode.querySelectorAll('.metric')].map(metric => ({
                label: toCleanString((metric.querySelector('.label') || {}).textContent),
                value: toCleanString((metric.querySelector('.value') || {}).textContent)
              }))
            : [];

          return {
            label: toCleanString(catBtn.textContent),
            metrics
          };
        });

        return {
          label: toCleanString(tabEl.textContent),
          categories
        };
      });

      return {
        template: 'dashboard',
        theme,
        title,
        kicker,
        activeTab: 0,
        activeCategory: 0,
        tabs,
        tools: []
      };
    }

    function extractBalancedObjectLiteral(source, startIndex) {
      let depth = 0;
      let inString = false;
      let quote = '';
      let escaped = false;

      for (let i = startIndex; i < source.length; i += 1) {
        const ch = source[i];

        if (inString) {
          if (escaped) {
            escaped = false;
            continue;
          }
          if (ch === '\\') {
            escaped = true;
            continue;
          }
          if (ch === quote) {
            inString = false;
            quote = '';
          }
          continue;
        }

        if (ch === '"' || ch === "'") {
          inString = true;
          quote = ch;
          continue;
        }

        if (ch === '{') {
          depth += 1;
          continue;
        }

        if (ch === '}') {
          depth -= 1;
          if (depth === 0) {
            return source.slice(startIndex, i + 1);
          }
        }
      }

      return null;
    }

    function parseLooseStateObject(text) {
      if (!text) return null;
      const trimmed = text.trim();
      if (!trimmed) return null;

      try {
        return JSON.parse(trimmed);
      } catch (_) {
        try {
          // Legacy exports may use JS object literals (single quotes/trailing commas).
          return Function(`"use strict";return (${trimmed});`)();
        } catch (_) {
          return null;
        }
      }
    }

    function unwrapImportedStateContainer(parsed) {
      if (!parsed || typeof parsed !== 'object') return parsed;
      if (parsed.toolboxState && typeof parsed.toolboxState === 'object') return parsed.toolboxState;
      if (parsed.state && typeof parsed.state === 'object') return parsed.state;
      if (parsed.data && parsed.data.toolboxState && typeof parsed.data.toolboxState === 'object') return parsed.data.toolboxState;
      if (parsed.export && typeof parsed.export === 'object') return parsed.export;
      return parsed;
    }

    function extractLegacyStateFromHtmlText(fileText) {
      const patterns = [
        /window\.__TOOLBOX_STATE__\s*=\s*\{/i,
        /const\s+toolboxState\s*=\s*\{/i,
        /let\s+toolboxState\s*=\s*\{/i,
        /var\s+toolboxState\s*=\s*\{/i,
        /"toolboxState"\s*:\s*\{/i,
        /"state"\s*:\s*\{/i
      ];

      for (const pattern of patterns) {
        const match = pattern.exec(fileText);
        if (!match) continue;

        const braceIndex = fileText.indexOf('{', match.index);
        if (braceIndex < 0) continue;

        const objectText = extractBalancedObjectLiteral(fileText, braceIndex);
        const parsed = parseLooseStateObject(objectText);
        const unwrapped = unwrapImportedStateContainer(parsed);
        if (unwrapped && typeof unwrapped === 'object') {
          return unwrapped;
        }
      }

      return null;
    }

    function extractImportedState(fileText, fileName) {
      if (/\.json$/i.test(fileName)) {
        const parsed = JSON.parse(fileText);
        return unwrapImportedStateContainer(parsed);
      }

      const doc = new DOMParser().parseFromString(fileText, 'text/html');
      const stateNode = doc.getElementById('toolbox-state');
      if (stateNode && stateNode.textContent) {
        const parsed = parseLooseStateObject(stateNode.textContent);
        if (parsed && typeof parsed === 'object') {
          return unwrapImportedStateContainer(parsed);
        }
      }

      const legacyState = extractLegacyStateFromHtmlText(fileText);
      if (legacyState) return legacyState;

      // Backward-compatible import for pages exported before state embedding.
      return inferStateFromHtmlDoc(doc);
    }

    let previewTimer;
    function schedulePreview() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(updatePreview, 320);
    }

    // ─── PANEL RENDERER ──────────────────────────────────────────────────────
    function renderPanel() {
      const panel = document.getElementById('builderPanel');
      const focusedId = document.activeElement && document.activeElement.id || null;
      const focusedPos = document.activeElement && document.activeElement.selectionStart;
      panel.innerHTML = buildPanelHTML();
      bindEvents();
      if (focusedId) {
        const el = document.getElementById(focusedId);
        if (el) {
          el.focus();
          try { el.setSelectionRange(focusedPos, focusedPos); } catch (_) {}
        }
      }
    }

        <span class="pill ${i === S.activeTab ? 'active' : ''}" data-tab-sel="${i}">

          <div class="section-body">
            <div class="col-heads">

    function buildCatalogEditorHTML() {
      const entries = S.tools.map((t, i) => `

    // ─── EVENT BINDING ───────────────────────────────────────────────────────
    function bindEvents() {
      const panel = document.getElementById('builderPanel');

      // Theme pick
      panel.querySelectorAll('[data-theme-pick]').forEach(el =>
        el.addEventListener('click', () => { S.theme = el.dataset.themePick; renderPanel(); schedulePreview(); }));

      // Template pick
      panel.querySelectorAll('[data-pick]').forEach(el =>
        el.addEventListener('click', () => { S.template = el.dataset.pick; renderPanel(); schedulePreview(); }));

      // Page info
      on('f-title',    v => { S.title  = v; schedulePreview(); });
      on('f-kicker',   v => { S.kicker = v; schedulePreview(); });
      on('f-tab-label', v => { if (S.tabs[S.activeTab]) { S.tabs[S.activeTab].label = v; schedulePreview(); } });
      on('f-cat-label', v => {
        const t = S.tabs[S.activeTab];
        if (t && t.categories[S.activeCategory]) { t.categories[S.activeCategory].label = v; schedulePreview(); }
      });

      // Tab pills
      panel.querySelectorAll('[data-tab-sel]').forEach(el =>
        el.addEventListener('click', e => {
          if (e.target.hasAttribute('data-tab-del')) return;
          S.activeTab = +el.dataset.tabSel; S.activeCategory = 0; renderPanel();
        }));
      panel.querySelectorAll('[data-tab-del]').forEach(el =>
        el.addEventListener('click', e => {
          e.stopPropagation();
          S.tabs.splice(+el.dataset.tabDel, 1);
          S.activeTab = Math.min(S.activeTab, Math.max(0, S.tabs.length - 1));
          S.activeCategory = 0; renderPanel(); schedulePreview();
        }));
      const addTab = document.getElementById('addTabBtn');
      if (addTab) addTab.addEventListener('click', () => {
        S.tabs.push({ label: '', categories: [] });
        S.activeTab = S.tabs.length - 1; S.activeCategory = 0; renderPanel(); schedulePreview();
      });

      // Category pills
      panel.querySelectorAll('[data-cat-sel]').forEach(el =>
        el.addEventListener('click', e => {
          if (e.target.hasAttribute('data-cat-del')) return;
          S.activeCategory = +el.dataset.catSel; renderPanel();
        }));
      panel.querySelectorAll('[data-cat-del]').forEach(el =>
        el.addEventListener('click', e => {
          e.stopPropagation();
          const t = S.tabs[S.activeTab]; if (!t) return;
          t.categories.splice(+el.dataset.catDel, 1);
          S.activeCategory = Math.min(S.activeCategory, Math.max(0, t.categories.length - 1));
          renderPanel(); schedulePreview();
        }));
      const addCat = document.getElementById('addCatBtn');
      if (addCat) addCat.addEventListener('click', () => {
        const t = S.tabs[S.activeTab]; if (!t) return;
        t.categories.push({ label: '', metrics: [] });
        S.activeCategory = t.categories.length - 1; renderPanel(); schedulePreview();
      });

      // Metrics
      panel.querySelectorAll('[data-ml]').forEach(el =>
        el.addEventListener('input', () => {
          const cat = S.tabs[S.activeTab]?.categories[S.activeCategory];
          if (cat?.metrics[+el.dataset.ml]) { cat.metrics[+el.dataset.ml].label = el.value; schedulePreview(); }
        }));
      panel.querySelectorAll('[data-mv]').forEach(el =>
        el.addEventListener('input', () => {
          const cat = S.tabs[S.activeTab]?.categories[S.activeCategory];
          if (cat?.metrics[+el.dataset.mv]) { cat.metrics[+el.dataset.mv].value = el.value; schedulePreview(); }
        }));
      panel.querySelectorAll('[data-md]').forEach(el =>
        el.addEventListener('click', () => {
          const cat = S.tabs[S.activeTab]?.categories[S.activeCategory];
          if (cat) { cat.metrics.splice(+el.dataset.md, 1); renderPanel(); schedulePreview(); }
        }));
      const addMetric = document.getElementById('addMetricBtn');
      if (addMetric) addMetric.addEventListener('click', () => {
        const cat = S.tabs[S.activeTab]?.categories[S.activeCategory];
        if (cat) { cat.metrics.push({ label: '', value: '' }); renderPanel(); }
      });

      // Tools
      panel.querySelectorAll('[data-tn]').forEach(el =>
        el.addEventListener('input', () => { S.tools[+el.dataset.tn].name = el.value; schedulePreview(); }));
      panel.querySelectorAll('[data-tt]').forEach(el =>
        el.addEventListener('input', () => { S.tools[+el.dataset.tt].type = el.value; schedulePreview(); }));
      panel.querySelectorAll('[data-td]').forEach(el =>
        el.addEventListener('input', () => { S.tools[+el.dataset.td].description = el.value; schedulePreview(); }));
      panel.querySelectorAll('[data-tu]').forEach(el =>
        el.addEventListener('input', () => { S.tools[+el.dataset.tu].url = el.value; schedulePreview(); }));
      panel.querySelectorAll('[data-toolDel]').forEach(el =>
        el.addEventListener('click', () => {
          S.tools.splice(+el.dataset.toolDel, 1); renderPanel(); schedulePreview();
        }));
      const addTool = document.getElementById('addToolBtn');
      if (addTool) addTool.addEventListener('click', () => {
        S.tools.push({ name: '', type: '', description: '', url: '' }); renderPanel();
      });
    }

    function on(id, fn) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', () => fn(el.value));
    }

    // ─── PREVIEW + DOWNLOAD ──────────────────────────────────────────────────
    function updatePreview() {
      const html = S.template === 'dashboard' ? generateDashboardHTML() : generateCatalogHTML();
      document.getElementById('previewFrame').srcdoc = html;
      const s = document.getElementById('previewStatus');
      if (s) s.textContent = 'Updated ' + new Date().toLocaleTimeString();
    }

    document.getElementById('refreshBtn').addEventListener('click', updatePreview);

    const importInput = document.getElementById('importInput');
    document.getElementById('importBtn').addEventListener('click', () => {
      importInput.click();
    });

    importInput.addEventListener('change', async () => {
      const file = importInput.files && importInput.files[0];
      if (!file) return;

      try {
        const fileText = await file.text();
        const importedRaw = extractImportedState(fileText, file.name);
        S = normalizeImportedState(importedRaw);
        renderPanel();
        updatePreview();
        const status = document.getElementById('previewStatus');
        if (status) status.textContent = `Imported ${file.name}`;
      } catch (err) {
        alert('Import failed. Please choose a Toolbox-exported HTML or Toolbox JSON file.');
      } finally {
        importInput.value = '';
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const html = S.template === 'dashboard' ? generateDashboardHTML() : generateCatalogHTML();
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'toolbox.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // ─── INIT ────────────────────────────────────────────────────────────────
    renderPanel();
    updatePreview();
  </script>
</body>
</html>
